# ──────────────────────────────────────────────────────────────────────────────
# Malakar Automa – Solo Card Definitions
# ──────────────────────────────────────────────────────────────────────────────
#
# 17 solo deck cards for the Malakar automa (Inferno solo opponent):
#   - 16 game cards (numbered 1-16) with priorities for Malakar's decisions
#   - 1 reshuffle card (number 17) — triggers tower reorganization + deck reshuffle
#
# CARD FIELDS (for cards 1-16):
# ─────────────────────────────
#   number:                  Card number (1-16)
#   soul_priority:           Ordered list of soul colors for tie-breaking
#                            (left-to-right, top-to-bottom as shown on card).
#                            Colors: beige, purple, green, yellow, blue,
#                                    orange, red, gray, ice_blue
#   shield_direction:        "left" or "right" — which side of a Hell circle
#                            to place souls (arrow on card)
#   exchange_direction:      "left" (exchange 1 Florin) or "right" (exchange max)
#   priority_location_free:  Free-access location Malakar prefers:
#                            haystack, banquet, bank, courtyard
#   priority_location_special: Special location Malakar prefers:
#                              bonfire, wall, market, palace
#   tie_arrow:               "left" or "right" — for tie-breaking (Fraud cards, etc.)
#   tower_guest_order:       Ordered list of guest colors for tower reorganization
#                            (bottom-to-top of tower)
#
# NOTE: These values must be manually transcribed from the card images in
#       agent_support_files/High Resolution Printing/card1-16.png
#       The below are PLACEHOLDER values — replace them with the real card data.
# ──────────────────────────────────────────────────────────────────────────────

