# ──────────────────────────────────────────────────────────────────────────────
# Malakar Automa – Solo Card Definitions
# ──────────────────────────────────────────────────────────────────────────────
#
# 17 solo deck cards for the Malakar automa (Inferno solo opponent):
#   - 1 reshuffle card (number 1) — triggers deck reshuffle
#   - 16 game cards (numbered 2-17) with priorities for Malakar's decisions
#
# CARD FIELDS (for cards 1-16):
# ─────────────────────────────
#   number:             Card number (1-16)
#   soul_priority:      Ordered list of 8 soul colors for tie-breaking
#                       (left-to-right, top-to-bottom as shown on card).
#                       Colors: red, purple, blue, green, yellow, grey,
#                               brown, ice_blue
#                       (brown = orange/Heresy, grey = gray/Fraud)
#   shield_priority:    Ordered list of 4 shields for shield tie-breaking
#                       Shields: goat, keys, church, wheel
#   arrow_direction:    "left" or "right" — directional arrow on the card
#   priority_location:  "free_access" or "special" — which location type
#                       Malakar prefers this turn
#
# NOTE: These values must be manually transcribed from the card images in
#       agent_support_files/High Resolution Printing/card1-16.png
#       The below are PLACEHOLDER values — replace them with the real card data.
# ──────────────────────────────────────────────────────────────────────────────

